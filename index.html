<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mini Game - Bảng Chữ</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="topbar">
      <div class="brand">Mini Game — Bảng Chữ</div>
      <div class="actions">
        <div class="login">
          <select id="roleSelect">
            <option value="guest">Khách</option>
            <option value="admin">Admin</option>
          </select>
          <input id="loginName" placeholder="Tên đăng nhập" style="width:160px;margin-left:8px;padding:6px;border-radius:6px">
          <button id="loginBtn" class="btn">Đăng nhập</button>
          <button id="logoutBtn" class="btn" style="display:none">Đăng xuất</button>
        </div>
        <div class="round-controls" style="display:flex;align-items:center;margin-left:12px">
          <div id="roundTimer" class="small">Sẵn sàng</div>
          <button id="loadBtn" class="btn admin-only">Load</button>
          <button id="clearBtn" class="btn admin-only">Clear</button>
        </div>
      </div>
    </header>

    <div class="layout">
      <section id="boardSection" class="card board-card">
        <h3>Bảng chữ</h3>
        <div id="board" class="board"></div>
        <div id="answersInfo" class="note"></div>
      </section>

      <section id="playerSection" class="card">
        <h3>Người chơi</h3>
        <div class="row">
          <!-- player names come from login; no manual add -->
        </div>
        <div id="players" class="players-list"></div>
      </section>

      <section id="scoreSection" class="card">
        <h3>Bảng xếp hạng</h3>
        <table id="scoreTable">
          <thead><tr><th>#</th><th>Tên</th><th>Đúng</th><th>Thời gian</th></tr></thead>
          <tbody></tbody>
        </table>
      </section>

      <section id="admin" class="card admin-only">
        <h3>Admin — Nạp bảng & đáp án</h3>
        <textarea id="adminInput" placeholder="Nhập JSON hoặc mỗi dòng 1 hàng; dòng cuối là đáp án cách nhau bằng dấu phẩy / khoảng trắng"></textarea>
        <input id="answersInput" type="text" placeholder="ví dụ: BEG, HIJ" style="width:100%;padding:8px;border-radius:6px;margin-top:6px">
      </section>
    </div>

    <footer>
      <p>Tạo bởi Nguyễn Chí Thanh</p>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
